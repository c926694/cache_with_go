syntax = "proto3";
package pb;

option go_package = "./pb";

message GetRequest {
  string key = 1;
}
message SetRequest {
  string key = 1;
  bytes value = 2;
}
message DeleteRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
}
message SetResponse {
  bool success = 1;
}
message DeleteResponse {
  bool success = 1;
}

service Cache {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}
